<title>JC TV STREAMING</title>

<style>

body {
  background: #fff;
  color: #000;
  padding: 1rem;
}

/* Centraliza os cards da aba de séries */
#seriesTabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
  padding: 1rem 0;
  margin-top: 100px; /* espaço para a barra fixa */
}

#seriesTabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
  padding: 1rem 0;
  margin-top: 100px;
}

.series-tab {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background-color: #eee;
  border-radius: 0.5rem;
  max-width: 100%;
  white-space: normal;
  cursor: pointer;
}

.series-tab img {
  width: 100%;
  height: 100%;
  border-radius: 5px;
  flex-shrink: 0;
}

.series-tab .card {
  width: 100px;
}

.card-body p.card-text {
  white-space: normal !important;
  word-break: break-word;
  overflow-wrap: break-word;
  font-size: 0.75rem;
  text-align: center;
  max-height: 6em;
  line-height: 1.2;
}

#serieInfo {
  display: none;
  padding: 1rem;
  background: rgba(255, 255, 255, 0.25); /* fundo transparente */
  border-radius: 12px;
  margin: 1rem auto;
  max-width: 1200px;
  backdrop-filter: blur(10px); /* deixa borrado */
  -webkit-backdrop-filter: blur(10px);
  color: #000; /* texto preto forte */
}

.serie-details {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}

.serie-details img {
  width: 100px;
  height: auto;
  border-radius: 5px;
}

.serie-details div {
  flex: 1;
}

#serieInfo h4,
#serieInfo p {
  color: #000; /* garante que todos os textos fiquem bem pretos */
  font-weight: 600; /* um pouco mais forte que normal */
}

.ep-thumb {
  width: 80px;
  height: 45px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
}

#backButton {
  display: none;
  position: fixed;
  top: 2px; /* afasta um pouco do topo */
  right: 0px; /* afasta um pouco da esquerda */
  z-index: 1055;
  background-color: #FFC107;
  color: #000000;
  border: none;
  padding: 8px 10px; /* menor que antes */
  border-radius: 10px; /* menor arredondamento */
  cursor: pointer;
  font-weight: bold; /* Texto em negrito */
  font-size: 12px; /* fonte menor */
  transition: 0.3s ease;
}

#backButton:hover {
  background-color: #007BFF;
  color: #fff; /* melhora contraste no hover */
}

/* Footer */
footer.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: black;
  color: #fff; /* cor diferente */
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 1rem; /* maior */
  z-index: 1000;
}

footer.footer img {
  height: 30px;
  width: auto;
}

#centralSearch {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  z-index: 1050;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#serieSynopsis .synopsis-text {
  display: block;
  overflow: hidden;
}

}

#espelharBtn {
  display: none !important;
}

.btn-success {
  background-color: #FFC107;
  color: #000000;
  font-size: 1rem;
  padding: 0.25rem 1rem;
  border-radius: 10px;
  font-weight: bold;
  margin-left: 0; /* 👈 remove o bug */
}

.btn-success:hover {
  background: #007BFF;
}

.active-episode {
  background: #ffc107 !important;
  color: #000 !important;
  font-weight: bold;
  border-radius: 8px;
  transition: 0.3s;
}

.modal-header {
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  border: none;
  position: absolute;
  width: 100%;
  z-index: 10;
}

#modalTitleText {
  font-size: clamp(10px, 2vw, 14px);
}
/* GRID de episódios */
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15px, 1fr));
  gap: 10px;
}

/* quadradinho */
.episode-box {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.episode-box:hover {
  transform: scale(1.05);
}

/* thumb */
.ep-thumb-grid {
  width: 100%;
  height: 60px;
  object-fit: cover;
}

/* número do episódio */
.ep-number {
  position: absolute;
  bottom: 5px;
  right: 8px;
  background: #ffc107;
  color: #000;
  font-size: 12px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 6px;
}
.episode-box.active-episode {
  outline: 2px solid #ffc107;
}
.episode-grid {
  display: flex;
  overflow-x: auto;
}

</style>

    </div>
  </div>
</div>

// ---------------- Categorias
function populateCategories(){
  const allCategories = new Set();
  Object.values(seriesData).forEach(s => s.categories.forEach(c => allCategories.add(c)));
  [...allCategories].sort().forEach(cat=>{
    const option = document.createElement("option");
    option.value = cat; option.textContent = cat;
    categoryFilter.appendChild(option);
  });
}

// ---------------- Monta abas (ordenando por date)
function buildTabs(filteredKeys = null) {
  seriesTabs.innerHTML = "";
  let keys = filteredKeys || Object.keys(seriesData);

  // Ordena por data (mais recente primeiro)
  keys.sort((a, b) => {
    const dateA = seriesData[a].date
      ? new Date(seriesData[a].date.split("/").reverse().join("-"))
      : new Date(0);
    const dateB = seriesData[b].date
      ? new Date(seriesData[b].date.split("/").reverse().join("-"))
      : new Date(0);
    return dateB - dateA;
  });

  keys.forEach(key => {
    const s = seriesData[key];
    const li = document.createElement("li");
    li.className = "nav-item";

    const btn = document.createElement("button");
    btn.className = "nav-link p-0 border-0 bg-transparent text-center series-tab";
    btn.dataset.target = key;

    // 🔴 TV AO VIVO
  if (s.categories && s.categories.some(c => c.toLowerCase() === "tv ao vivo")) {

    btn.innerHTML = `
      <div class="card border-0 text-center" style="width: 110px;">
        <img src="${s.poster}" 
          style="height:60px; object-fit:contain; background:#fff; padding:5px;" 
          class="rounded">

        <div class="card-body p-1">
          <p class="card-text small mb-0">${s.name}</p>
          <small style="font-size:10px; color:#6c757d;">
            <span style="color:#dc3545;">●</span> Ao Vivo
          </small>
        </div>
      </div>
    `;

  } else {

    btn.innerHTML = `
      <div class="card border-0" style="width: 80px;">
        <img src="${s.poster}" class="card-img-top rounded"
          style="height:120px;object-fit:cover;" alt="${s.name}">
        
        <div class="card-body p-1">
          <p class="card-text small text-truncate mb-0">${s.name}</p>
        </div>
      </div>
    `;
  }

  li.appendChild(btn);
  seriesTabs.appendChild(li);
});

  // ---------------- Episódios ----------------
  seasonEpisodesContainer.innerHTML = "";

// ---------------- Filtros de busca + categoria
function applyFilters() {
  const q = (seriesSearch.value || "").toLowerCase().trim();
  const cat = categoryFilter.value;

  const keys = Object.keys(seriesData).filter(key => {
    const s = seriesData[key];

    // filtro de texto (nome da série)
    if (q && !s.name.toLowerCase().includes(q)) return false;

    // filtro de categoria
    if (cat && !(s.categories || []).some(c => c.toLowerCase() === cat.toLowerCase()))
      return false;

    return true;
  });

  buildTabs(keys);
}

  // Encontra todos os episódios da mesma temporada
  const seasonContainer = epItem.closest(".accordion-collapse"); 
  const seasonEps = Array.from(seasonContainer.querySelectorAll(".open-player"));

  episodeQueue = seasonEps.map(b => ({
      src: b.dataset.vid,
      title: b.dataset.title,
      logo: seriesData[currentSeries].logotipo // <<< IMPORTANTE AQUI
  }));

  currentEpisodeIndex = seasonEps.indexOf(epItem);
  playEpisode(currentEpisodeIndex);
});

function playEpisode(index){
  if(index < 0 || index >= episodeQueue.length) return;

  currentEpisodeIndex = index;
  const videoData = episodeQueue[currentEpisodeIndex];

  // ---------------- TÍTULO DO MODAL ----------------
  document.getElementById("modalTitleText").textContent = videoData.title;

  // ---------------- LOGOTIPO NO MODAL ----------------
  const modalLogo = document.getElementById("modalLogo");

  if (videoData.logo) {
    modalLogo.src = videoData.logo;
    modalLogo.style.display = "block";
  } else {
    modalLogo.style.display = "none";
  }

  // ---------------- PLAYER ----------------
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }

  modalVideo.pause();
  modalVideo.src = "";

  if (Hls.isSupported() && videoData.src.endsWith(".m3u8")) {
    currentHls = new Hls();
    currentHls.loadSource(videoData.src);
    currentHls.attachMedia(modalVideo);
    currentHls.on(Hls.Events.MANIFEST_PARSED, () => modalVideo.play());
  } else {
    modalVideo.src = videoData.src;
    modalVideo.play();
  }

  new bootstrap.Modal(document.getElementById("playerModal")).show();
}

castButton.addEventListener("click", (e) => {

    alert("Nenhum vídeo carregado.");
    return;
  }

  const title = modalTitle.textContent || "JC TV STREAMING";
  const realUrl = episodeQueue[currentEpisodeIndex].src;

  // Mantém o https://
  const intentLink = `intent://${realUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.instantbits.cast.webvideo;S.title=${encodeURIComponent(title)};end`;

  // Redireciona para o app
  window.location.href = intentLink;
});

// 🔥 PLAYER UNIVERSAL (SOBRESCREVE)
// ===============================

function nextEpisodeFallback() {
  if (currentEpisodeIndex < episodeQueue.length - 1) {
    console.log("Tentando próximo link...");
    playEpisode(currentEpisodeIndex + 1);
  } else {
    console.log("Nenhum link funcionou.");
  }
}

// 🔥 SOBRESCREVE SUA FUNÇÃO ORIGINAL
playEpisode = function(index){

  if(index < 0 || index >= episodeQueue.length) return;

  currentEpisodeIndex = index;
  const videoData = episodeQueue[currentEpisodeIndex];

  // ---------------- TÍTULO ----------------
  document.getElementById("modalTitleText").textContent = videoData.title;

  // ---------------- LOGO ----------------
  const modalLogo = document.getElementById("modalLogo");
  if (videoData.logo) {
    modalLogo.src = videoData.logo;
    modalLogo.style.display = "block";
  } else {
    modalLogo.style.display = "none";
  }

  // ---------------- LIMPA PLAYER ----------------
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }

  modalVideo.pause();
  modalVideo.removeAttribute("src");
  modalVideo.load();

  // Remove iframe antigo
  const oldIframe = document.getElementById("iframePlayer");
  if (oldIframe) oldIframe.remove();

  modalVideo.style.display = "block";

  const url = videoData.src;

  // ===============================
  // 🔥 DETECÇÃO INTELIGENTE
  // ===============================

  if (url.includes(".m3u8")) {

    if (Hls.isSupported()) {
      currentHls = new Hls();
      currentHls.loadSource(url);
      currentHls.attachMedia(modalVideo);

      currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
        modalVideo.play();
      });

      currentHls.on(Hls.Events.ERROR, () => {
        nextEpisodeFallback();
      });

    } else if (modalVideo.canPlayType("application/vnd.apple.mpegurl")) {
      modalVideo.src = url;
      modalVideo.play();
    }

  } else if (url.includes(".mp4")) {

    modalVideo.src = url;
    modalVideo.play();

    modalVideo.onerror = () => nextEpisodeFallback();

  } else if (url.includes(".mpd")) {

    // DASH
    if (!window.dashjs) {
      const script = document.createElement("script");
      script.src = "https://cdn.dashjs.org/latest/dash.all.min.js";
      script.onload = () => {
        const player = dashjs.MediaPlayer().create();
        player.initialize(modalVideo, url, true);
      };
      document.body.appendChild(script);
    } else {
      const player = dashjs.MediaPlayer().create();
      player.initialize(modalVideo, url, true);
    }

  } else {

    // ===============================
    // 🔥 EMBED / IFRAME
    // ===============================

    modalVideo.style.display = "none";

    const iframe = document.createElement("iframe");
    iframe.id = "iframePlayer";
    iframe.src = url;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.allow = "autoplay; fullscreen";

    document.querySelector(".modal-body").appendChild(iframe);
  }

  new bootstrap.Modal(document.getElementById("playerModal")).show();
};

populateCategories(); buildTabs(); updateUIOnTabToggle();

      setTimeout(() => {
        location.reload();
      }, 1000);
    }

    document.querySelectorAll('a').forEach(link => {
      link.setAttribute('target', '_self');
    });

    document.addEventListener('keydown', function(e) {
      const tecla = e.key.toLowerCase();
      if (
        e.key === "F12" ||
        (e.ctrlKey && tecla === 'u') ||
        (e.ctrlKey && tecla === 's') ||
        (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(tecla))
      ) {
        e.preventDefault();
        mostrarAlerta();
      }
    });

    window.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
