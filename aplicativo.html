<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JC TV STREAMING</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
body { background: #fff; color: #000; padding: 1rem; }
/* Centraliza os cards da aba de séries */
      #seriesTabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 0;
      margin-top: 100px; /* espaço para a barra fixa */
    }
#seriesTabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; padding: 1rem 0; margin-top: 100px; }
.series-tab { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background-color: #eee; border-radius: 0.5rem; max-width: 100%; white-space: normal; cursor: pointer; }
.series-tab img { width: 100%; height: 100%; border-radius: 5px; flex-shrink: 0; }
.series-tab .card { width: 100px; }
.card-body p.card-text { white-space: normal !important; word-break: break-word; overflow-wrap: break-word; font-size: 0.75rem; text-align: center; max-height: 6em; line-height: 1.2; }
#serieInfo {
    display: none;
    padding: 1rem;
    background: rgba(255, 255, 255, 0.25); /* fundo transparente */
    border-radius: 12px;
    margin: 1rem auto;
    max-width: 1200px;
    backdrop-filter: blur(10px); /* deixa borrado */
    -webkit-backdrop-filter: blur(10px);
    color: #000; /* texto preto forte */
}
.serie-details { display: flex; gap: 1rem; align-items: flex-start; }
.serie-details img { width: 100px; height: auto; border-radius: 5px; }
.serie-details div { flex: 1; }
#serieInfo h4,
#serieInfo p {
    color: #000; /* garante que todos os textos fiquem bem pretos */
    font-weight: 600; /* um pouco mais forte que normal */
}
.ep-thumb{
  width: 80px;
  height: 45px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
}
#backButton {
  display: none;
  position: fixed;
  top: 2px;       /* afasta um pouco do topo */
  right: 0px;      /* afasta um pouco da esquerda */
  z-index: 1055;
  background-color: #FFC107;
  color: #000000;
  border: none;
  padding: 8px 10px;    /* menor que antes */
  border-radius: 10px;   /* menor arredondamento */
  cursor: pointer;
  font-weight: bold;     /* Texto em negrito */
  font-size: 12px;      /* fonte menor */
  transition: 0.3s ease;
}

#backButton:hover {
  background-color: #007BFF;
  color: #fff;           /* melhora contraste no hover */
}
 /* Footer */
  footer.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: black;
    color: #fff; /* cor diferente */
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    font-size: 1rem; /* maior */
    z-index: 1000;
  }
  footer.footer img {
    height: 30px;
    width: auto;
  }
#centralSearch { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); width: 200px; z-index: 1050; display: flex; flex-direction: column; gap: 8px; }
#serieSynopsis .synopsis-text { display: block; overflow: hidden; }
}
#espelharBtn {
  display: none !important;
}
.btn-success {
  background-color: #FFC107;
  color: #000000;
  font-size: 1rem;
  padding: 0.25rem 1rem;
  border-radius: 10px;
  font-weight: bold;

  margin-left: 0; /* 👈 remove o bug */
}

.btn-success:hover {
  background: #007BFF;
}
.active-episode {
  background: #ffc107 !important;
  color: #000 !important;
  font-weight: bold;
  border-radius: 8px;
  transition: 0.3s;
}
</style>
</head>
<body>
<button id="backButton" class="btn btn-primary btn-lg">Voltar</button>

<div id="centralSearch">
  <input type="search" id="seriesSearch" class="form-control" placeholder="Pesquisar...">
  <select id="categoryFilter" class="form-select">
    <option value="">Todas as Categorias</option>
  </select>
</div>

<ul class="nav nav-tabs d-flex flex-wrap gap-3 mb-3 border-0" id="seriesTabs"></ul>

<div id="serieInfo" class="card p-3" style="display:none; background: rgba(255, 255, 255, 0.25);">

      <p><strong>Linguagem:</strong> <span id="serieLanguage"></span></p>
    </div>
  </div>
  <div id="seasonEpisodesContainer" class="mt-4"></div>
</div>

<div class="col-12 mt-4">
  <div class="playerButtons" id="serverButtons"></div>
</div>

<!-- Rodapé institucional após os canais -->
<div class="col-12 mt-4">
   <div class="playerButtons" id="serverButtons"></div>

    <p><br></p>
    <p></p>
  </div>
</div>

<!-- 🔹 Novo Modal com opções -->
<div class="modal fade" id="choiceModal" tabindex="-1" aria-hidden="true">

  <button id="espelharBtn" class="btn btn-warning w-100">📺 Espelhar</button>
</div>
    </div>
  </div>
</div>

// ---------------- Elementos
const seriesTabs = document.getElementById("seriesTabs");
const serieInfo = document.getElementById("serieInfo");
const serieTitle = document.getElementById("serieTitle");
const serieSynopsis = document.getElementById("serieSynopsis");
const seriePoster = document.getElementById("seriePoster");
const serieCategories = document.getElementById("serieCategories");
const serieGênero = document.getElementById("serieGênero");
const serieLanguage = document.getElementById("serieLanguage");
const seasonEpisodesContainer = document.getElementById("seasonEpisodesContainer");
const seriesSearch = document.getElementById("seriesSearch");
const categoryFilter = document.getElementById("categoryFilter");

let currentSeries = null;

// ---------------- epg
async function getNowPlayingXML(epgId) {
  try {
    const res = await fetch("https://epg-xml.jctvstreaming-vip.workers.dev/epg.xml?token=exclusivo-JCTVSTREAMING"); // 👈 seu XML
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const programs = xml.querySelectorAll(`programme[channel="${epgId}"]`);

    const now = new Date();

    for (let p of programs) {
      const start = new Date(formatEPGDate(p.getAttribute("start")));
      const stop = new Date(formatEPGDate(p.getAttribute("stop")));

      if (now >= start && now <= stop) {
        return p.querySelector("title")?.textContent || "Ao vivo";
      }
    }

    return "Ao vivo";
  } catch (e) {
    return "Ao vivo";
  }
}

// ---------------- Converter epg
function formatEPGDate(epgDate) {
  const year = epgDate.slice(0,4);
  const month = epgDate.slice(4,6);
  const day = epgDate.slice(6,8);
  const hour = epgDate.slice(8,10);
  const min = epgDate.slice(10,12);
  const sec = epgDate.slice(12,14);

  return `${year}-${month}-${day}T${hour}:${min}:${sec}`;
}

// ---------------- Categorias
function populateCategories(){
  const allCategories = new Set();
  Object.values(seriesData).forEach(s => s.categories.forEach(c => allCategories.add(c)));
  [...allCategories].sort().forEach(cat=>{
    const option = document.createElement("option");
    option.value = cat; option.textContent = cat;
    categoryFilter.appendChild(option);
  });
}

// ---------------- Monta abas (ordenando por date)
function buildTabs(filteredKeys = null) {
  seriesTabs.innerHTML = "";
  let keys = filteredKeys || Object.keys(seriesData);

  // Ordena por data (mais recente primeiro)
  keys.sort((a, b) => {
    const dateA = seriesData[a].date
      ? new Date(seriesData[a].date.split("/").reverse().join("-"))
      : new Date(0);
    const dateB = seriesData[b].date
      ? new Date(seriesData[b].date.split("/").reverse().join("-"))
      : new Date(0);
    return dateB - dateA;
  });

  for (const key of keys) {
    const s = seriesData[key];

    const li = document.createElement("li");
    li.className = "nav-item";

    const btn = document.createElement("button");
    btn.className = "nav-link p-0 border-0 bg-transparent text-center series-tab";
    btn.dataset.target = key;

    // 🔴 TV AO VIVO (logo estilo IPTV)
    if (s.categories.includes("TV ao Vivo")) {

      btn.innerHTML = `
        <div class="card border-0 text-center" style="width: 110px;">
          
          <img src="${s.poster}" 
            style="height:60px; object-fit:contain; background:#fff; padding:5px;" 
            class="rounded">

          <div class="card-body p-1">
            <p class="card-text small mb-0">${s.name}</p>

            <small style="font-size:10px; color:#6c757d;">
            <span style="color:#dc3545;">●</span> Ao Vivo
             </small>
          </div>
        </div>
      `;

    } else {

      // 🟢 RESTO NORMAL
      btn.innerHTML = `
        <div class="card border-0" style="width: 80px;">
          <img src="${s.poster}" class="card-img-top rounded"
            style="height:120px;object-fit:cover;" alt="${s.name}">
          
          <div class="card-body p-1">
            <p class="card-text small text-truncate mb-0">${s.name}</p>
          </div>
        </div>
      `;

    }

    li.appendChild(btn);
    seriesTabs.appendChild(li);
  }
}

// -------------------- Mostra detalhes da série --------------------
function showSeasons(key, tabBtn) {
  const s = seriesData[key];
  serieTitle.textContent = s.name;
  seriePoster.src = s.poster;
  serieCategories.textContent = s.categories.join(", ");
  serieGênero.textContent = s.genero.join(", ");
  serieLanguage.textContent = s.language.join(", ");
  serieInfo.style.display = "block";

  // Sinopse com "ler mais/ler menos"
  serieSynopsis.innerHTML = "";
  const synopsisText = document.createElement("span");
  synopsisText.className = "synopsis-text";
  synopsisText.style.whiteSpace = "pre-wrap";
  synopsisText.style.display = "inline";

  const fullText = s.synopsis.trim();
  const shortText = fullText.length > 100 ? fullText.slice(0, 100) + "..." : fullText;
  let expanded = false;

  synopsisText.textContent = shortText;
  serieSynopsis.appendChild(synopsisText);

  if (fullText.length > 50) {
    const lerMaisBtn = document.createElement("span");
    lerMaisBtn.textContent = " ler mais";
    lerMaisBtn.style.color = "#007bff";
    lerMaisBtn.style.cursor = "pointer";
    lerMaisBtn.style.textDecoration = "underline";
    lerMaisBtn.style.marginLeft = "5px";

    serieSynopsis.appendChild(lerMaisBtn);

    lerMaisBtn.addEventListener("click", () => {
      expanded = !expanded;
      if (expanded) {
        synopsisText.textContent = fullText;
        lerMaisBtn.textContent = " ler menos";
      } else {
        synopsisText.textContent = shortText;
        lerMaisBtn.textContent = " ler mais";
      }
    });
  }

  // Posiciona info logo abaixo da aba selecionada
  const li = tabBtn.closest("li");
  li.insertAdjacentElement("afterend", serieInfo);

  // ---------------- CONTEÚDO ----------------
  seasonEpisodesContainer.innerHTML = "";

  // 🔥 SE FOR FILME → mostra só botão assistir
if (s.categories && s.categories.includes("Filmes")) {

  const temporada = Object.values(s.seasons)[0];
  const ep = temporada[0];

  seasonEpisodesContainer.innerHTML = `
    <div class="text-center mt-4">
      <button class="btn btn-success btn-lg open-player"
        data-vid="${ep.url}"
        data-title="${s.name}">
        🎬 Assistir
      </button>
    </div>
  `;

} else {

    // ---------------- Episódios normais ----------------
    let seasonId = 0;

    for (const [seasonNum, episodes] of Object.entries(s.seasons)) {
      seasonId++;
      const container = document.createElement("div");
      container.className = "accordion mb-2";
      container.id = `accordionSeason${seasonId}`;
      const item = document.createElement("div");
      item.className = "accordion-item";
      const headerId = `heading${seasonId}`;
      const collapseId = `collapse${seasonId}`;

      item.innerHTML = `
        <h2 class="accordion-header" id="${headerId}">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
            data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
            Temporada ${seasonNum}
          </button>
        </h2>
        <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headerId}"
             data-bs-parent="#accordionSeason${seasonId}">
          <ul class="list-group list-group-flush">
            ${episodes.map((ep, idx) => {
              const epTitle = ep.title ? ` – ${ep.title}` : "";
              const thumb = ep.thumb ? ep.thumb : "https://via.placeholder.com/80x45?text=Sem+Imagem";

              return `<li class="list-group-item open-player d-flex align-items-center gap-2"
                data-vid="${ep.url}"
                data-title="${s.name} – Temporada ${seasonNum} – Episódio ${idx + 1}${epTitle}">

                <img src="${thumb}" class="ep-thumb">
                <span>Episódio ${idx + 1}${epTitle}</span>

              </li>`;
            }).join("")}
          </ul>
        </div>
      `;

      container.appendChild(item);
      seasonEpisodesContainer.appendChild(container);
    }
  }

  // ---------------- Background ----------------
  if (s.categories && s.categories.includes("TV ao Vivo")) {
  document.body.style.backgroundImage = "url('https://cdn.faz-o-eli.online/preview/bbb8.webp')";
} else {
  document.body.style.backgroundImage = `url('${s.background}')`;
}
  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";
  document.body.style.backgroundRepeat = "no-repeat";
  document.body.style.backgroundAttachment = "fixed";
}

// ---------------- Toggle UI
function updateUIOnTabToggle(){
  if(currentSeries){ 
    backButton.style.display='block'; 
    seriesSearch.style.display='none'; 
    categoryFilter.style.display='none'; 
    document.querySelectorAll('#seriesTabs > li').forEach(li=>li.style.display='none'); 
  }
  else { 
    backButton.style.display='none'; 
    seriesSearch.style.display='block'; 
    categoryFilter.style.display='block'; 
    document.querySelectorAll('#seriesTabs > li').forEach(li=>li.style.display='inline-block'); 
  }
}

document.addEventListener("click", (e) => {
  const epItem = e.target.closest(".open-player, .series-tab");
if (!epItem) return;

  // efeito toque
  epItem.classList.add("touch-hover");
  setTimeout(() => {
    epItem.classList.remove("touch-hover");
  }, 300); // duração igual à transição CSS

  // carregar episódio normalmente
  const seasonContainer = epItem.closest(".accordion-collapse");
  const seasonEps = Array.from(seasonContainer.querySelectorAll(".open-player"));
  episodeQueue = seasonEps.map(b => ({ src: b.dataset.vid, title: b.dataset.title }));
  currentEpisodeIndex = seasonEps.indexOf(epItem);
  playEpisode(currentEpisodeIndex);
});

document.addEventListener("click", (e)=>{
  const epItem = e.target.closest(".open-player");
  if(!epItem) return;

  // Remover destaque anterior
  document.querySelectorAll(".open-player.active-episode").forEach(el=>el.classList.remove("active-episode"));
  epItem.classList.add("active-episode");

  // Para efeito de toque em celular
  document.querySelectorAll(".open-player.touch-hover").forEach(el=>el.classList.remove("touch-hover"));

  epItem.scrollIntoView({behavior:"smooth", block:"center"});

  const seasonContainer = epItem.closest(".accordion-collapse");

  currentEpisodeIndex = seasonEps.indexOf(epItem);

});

// ---------------- Eventos
seriesTabs.addEventListener("click", (e) => {
  const btn = e.target.closest("button.series-tab");
  if (!btn) return;

  const key = btn.dataset.target;
  const s = seriesData[key];

  // 🔴 SE FOR TV AO VIVO → abre direto no modal
  if (s.categories.includes("TV ao Vivo")) {

    const ep = Object.values(s.seasons)[0][0];

    selectedEpisodeUrl = ep.url;
    selectedEpisodeTitle = s.name;

    document.getElementById("choiceTitle").textContent = selectedEpisodeTitle;

    const choiceModal = new bootstrap.Modal(document.getElementById("choiceModal"));
    choiceModal.show();

    return; // 🚫 impede abrir detalhes
  }

  // 🟢 fluxo normal (séries/filmes)
  if (currentSeries === key) {
    currentSeries = null;
    serieInfo.style.display = "none";
    document.body.style.backgroundImage = "";
  } else {
    currentSeries = key;
    document.querySelectorAll("#seriesTabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showSeasons(key, btn);
  }

  updateUIOnTabToggle();
});

backButton.addEventListener("click", ()=>{ currentSeries=null; serieInfo.style.display="none"; document.body.style.backgroundImage=""; updateUIOnTabToggle(); });

// ---------------- Filtros de busca + categoria
function applyFilters() {
  const q = (seriesSearch.value || "").toLowerCase().trim();
  const cat = categoryFilter.value;

  const keys = Object.keys(seriesData).filter(key => {
    const s = seriesData[key];

    // filtro de texto (nome da série)
    if (q && !s.name.toLowerCase().includes(q)) return false;

    // filtro de categoria
    if (cat && !(s.categories || []).some(c => c.toLowerCase() === cat.toLowerCase()))
      return false;

    return true;
  });

  buildTabs(keys);
}

seriesSearch.addEventListener("input", applyFilters);
categoryFilter.addEventListener("change", applyFilters);

let selectedEpisodeUrl = "";
let selectedEpisodeTitle = "";


// Quando clicar no episódio → abrir modal com 2 opções
document.addEventListener("click", (e) => {
  const epItem = e.target.closest(".open-player");
  if (!epItem) return;

  // 🎯 DESTACAR EPISÓDIO
  document.querySelectorAll(".open-player.active-episode")
    .forEach(el => el.classList.remove("active-episode"));

  epItem.classList.add("active-episode");

  // 📜 SCROLL PARA O CENTRO
  epItem.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });

  // 🎬 DADOS DO EPISÓDIO
  selectedEpisodeUrl = epItem.dataset.vid;
  selectedEpisodeTitle = epItem.dataset.title;

  document.getElementById("choiceTitle").textContent = selectedEpisodeTitle;

  const choiceModal = new bootstrap.Modal(document.getElementById("choiceModal"));
  choiceModal.show();
});

// Espelhar → abre Web Video Cast
document.getElementById("espelharBtn").addEventListener("click", () => {
  if (!selectedEpisodeUrl) return;

  const intentLink = `intent://${selectedEpisodeUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.instantbits.cast.webvideo;S.title=${encodeURIComponent(selectedEpisodeTitle)};end`;

  // fecha modal
  const modalEl = document.getElementById("choiceModal");
  const modal = bootstrap.Modal.getInstance(modalEl);
  if (modal) modal.hide();

  // abre espelhamento
  window.location.href = intentLink;
});

// ---------------- Inicialização
populateCategories(); buildTabs(); updateUIOnTabToggle();
