      justify-content: center;
      align-items: center;

      overflow: hidden;

    .modal-header {
      background: #121212;
      border-bottom: 1px solid #333;

    #btnFechar, #btnProg {

      background-color: #222;
      color: #eee;
      font-weight: 600;
      padding: 6px 14px;
      margin-left: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      user-select: none;
    }
    #btnFechar:hover, #btnProg:hover { background-color: #444; }

    .btn-group-toggle {
      position: relative;
      display: inline-block;
    }
    #btnEspelhar {
      border: none;
      background-color: #FFC107;
      color: #000;
      font-weight: 600;

    #btnEspelhar:hover { background-color: #444; }
    #espelharDropdown {
      display: none;
      position: absolute;
      top: 40px;
      right: 0;
      font-size: 12px;
      padding: 4px 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 5px;
      z-index: 1001;

    }
    #espelharDropdown button {

      color: #eee;
      border: none;
      text-align: left;
      padding: 8px 12px;
      cursor: pointer;
      width: 100%;
    }
    #espelharDropdown button:hover { background: #444; }

    .modal-body {
      display: flex;
      flex: 1 1 auto;
      height: 100%;
      padding: 0;
      overflow: hidden;
    }
    #playerContainer {
      flex: 1 1 auto;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #playerFrame { width: 100%; height: 100%; border: none; background: black; }
    #programacaoPanel {
      width: 0;
      background: #121212;
      border-left: 2px solid #333;
      overflow: hidden;
      transition: width 0.3s ease;
      flex-shrink: 0;
      height: 100%;
    }
    #programacaoPanel.show { width: 350px; }
    #programacaoFrame { width: 100%; height: 100%; border: none; }

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const playerModal = document.getElementById("playerModal");
const modalPlayer = document.getElementById("playerFrame");
const programacaoPanel = document.getElementById("programacaoPanel");
const programacaoFrame = document.getElementById("programacaoFrame");
const btnFechar = document.getElementById("btnFechar");
const btnProg = document.getElementById("btnProg");
const btnEspelhar = document.getElementById("btnEspelhar");
const espelharDropdown = document.getElementById("espelharDropdown");
const castOpen = document.getElementById("castOpen");
const siteFooter = document.getElementById("siteFooter");
const searchInput = document.getElementById("searchInput");
const canalContainer = document.getElementById("canalContainer");

    const EPG_URL = "https://133154-jpw.jctvstreaming-vip.workers.dev/epg.xml?token=JCTV9F3K7A2M8Q4L6R5D1XHZN";

    // Modal abrir canal
playerModal.addEventListener("show.bs.modal", function(event) {
  const card = event.relatedTarget;
  const src = card.getAttribute("data-src");
  const title = card.getAttribute("data-title");
  if (!src) { event.preventDefault(); alert("Este canal ainda não está disponível."); return; }
  modalPlayer.src = src;
  document.getElementById("playerModalLabel").textContent = `Reproduzindo: ${title}`;
  programacaoFrame.src = EPG_URL;
  programacaoPanel.classList.remove("show");
  siteFooter.classList.add("d-none");
});

// Modal fechar
btnFechar.addEventListener("click", () => {
  const modal = bootstrap.Modal.getInstance(playerModal);
  if(modal) modal.hide();
});
playerModal.addEventListener("hidden.bs.modal", () => {
  modalPlayer.src = "";
  programacaoFrame.src = "";
  programacaoPanel.classList.remove("show");
  siteFooter.classList.remove("d-none");
});

// Toggle programação
btnProg.addEventListener("click", () => { programacaoPanel.classList.toggle("show"); });

// Toggle dropdown
btnEspelhar.addEventListener("click", () => { 
  espelharDropdown.style.display = espelharDropdown.style.display === "flex" ? "none" : "flex";
});

// Web Video Cast - Intent com token 84 caracteres
castOpen.addEventListener("click", (e) => {
  e.preventDefault();
  const url = modalPlayer.src;
  if (!url) { alert("Nenhum vídeo carregado."); return; }

  const gerarToken = (tamanho=84) => {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+|~-=";
    let token = "";
    for(let i=0;i<tamanho;i++) token += chars.charAt(Math.floor(Math.random()*chars.length));
    return token;
  };
  const token = gerarToken();
  const videoUrl = url + (url.includes("?")?"&":"?") + "token=" + token;
  const cleanUrl = videoUrl.replace(/^https?:\/\//, '');
  const intentLink = `intent://${cleanUrl}#Intent;scheme=https;package=com.instantbits.cast.webvideo;end`;
  window.location.href = intentLink;
});

// Busca de canais
searchInput.addEventListener("input", () => {
  const filter = searchInput.value.toLowerCase();
  canalContainer.querySelectorAll(".canal-card").forEach((canal) => {
    const title = canal.getAttribute("data-title")?.toLowerCase() || "";
    canal.parentElement.style.display = title.includes(filter) ? "" : "none";
  });
});

// Bloqueios básicos de devtools
function mostrarAlerta() {
  const tela = document.getElementById("bloqueio");
  tela.style.display = "block";
  setTimeout(()=> location.reload(),1000);
}
document.addEventListener("keydown", function(e) {
  const tecla = e.key.toLowerCase();
  if(e.key === "F12" || (e.ctrlKey && tecla==='u') || (e.ctrlKey && tecla==='s') || (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(tecla))) {
    e.preventDefault(); mostrarAlerta();
  }
});
window.addEventListener("contextmenu", e => e.preventDefault());
</script>

<!-- Tela de Alerta -->
<div id="bloqueio" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:99999;color:white;font-family:sans-serif;text-align:center;padding-top:100px;">
  <img src="https://www.mediafire.com/convkey/7a81/hl79s61t5v9c0555g.jpg" alt="Logo" style="width:150px;height:auto;margin-bottom:30px;">
  <h1 style="font-size:40px;">ACESSO NÃO AUTORIZADO</h1>
</div>

<script>
  // Mostrar o alerta e recarregar após 2 segundos
  function mostrarAlerta() {
    const tela = document.getElementById("bloqueio");
    tela.style.display = "block";
    setTimeout(() => {
      location.reload();
    }, 1000);
  }

  // Força todos os links a abrirem na mesma aba
  document.querySelectorAll('a').forEach(link => {
    link.setAttribute('target', '_self');
  });

  // Bloqueia ações de desenvolvedor (com alerta)
  document.addEventListener('keydown', function(e) {
    const tecla = e.key.toLowerCase();
    if (
      e.key === "F12" ||
      (e.ctrlKey && tecla === 'u') ||
      (e.ctrlKey && tecla === 's') ||
      (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(tecla))
    ) {
      e.preventDefault();
      mostrarAlerta();
    }
  });

  // Bloqueia botão direito (sem alerta)
  window.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });
</script>
