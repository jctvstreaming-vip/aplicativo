<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>JC TV STREAMING</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

<style>

body {
  background: #fff;
  color: #000;
  padding: 1rem;
}

/* Centraliza os cards da aba de séries */
#seriesTabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
  padding: 1rem 0;
  margin-top: 100px; /* espaço para a barra fixa */
}

#seriesTabs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1rem;
  padding: 1rem 0;
  margin-top: 100px;
}

.series-tab {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background-color: #eee;
  border-radius: 0.5rem;
  max-width: 100%;
  white-space: normal;
  cursor: pointer;
}

.series-tab img {
  width: 100%;
  height: 100%;
  border-radius: 5px;
  flex-shrink: 0;
}

.series-tab .card {
  width: 100px;
}

.card-body p.card-text {
  white-space: normal !important;
  word-break: break-word;
  overflow-wrap: break-word;
  font-size: 0.75rem;
  text-align: center;
  max-height: 6em;
  line-height: 1.2;
}

#serieInfo {
  display: none;
  padding: 1rem;
  background: rgba(255, 255, 255, 0.25); /* fundo transparente */
  border-radius: 12px;
  margin: 1rem auto;
  max-width: 1200px;
  backdrop-filter: blur(10px); /* deixa borrado */
  -webkit-backdrop-filter: blur(10px);
  color: #000; /* texto preto forte */
}

.serie-details {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}

.serie-details img {
  width: 100px;
  height: auto;
  border-radius: 5px;
}

.serie-details div {
  flex: 1;
}

#serieInfo h4,
#serieInfo p {
  color: #000; /* garante que todos os textos fiquem bem pretos */
  font-weight: 600; /* um pouco mais forte que normal */
}

.ep-thumb {
  width: 80px;
  height: 45px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
}

#backButton {
  display: none;
  position: fixed;
  top: 2px; /* afasta um pouco do topo */
  right: 0px; /* afasta um pouco da esquerda */
  z-index: 1055;
  background-color: #FFC107;
  color: #000000;
  border: none;
  padding: 8px 10px; /* menor que antes */
  border-radius: 10px; /* menor arredondamento */
  cursor: pointer;
  font-weight: bold; /* Texto em negrito */
  font-size: 12px; /* fonte menor */
  transition: 0.3s ease;
}

#backButton:hover {
  background-color: #007BFF;
  color: #fff; /* melhora contraste no hover */
}

/* Footer */
footer.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: black;
  color: #fff; /* cor diferente */
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 1rem; /* maior */
  z-index: 1000;
}

footer.footer img {
  height: 30px;
  width: auto;
}

#centralSearch {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  z-index: 1050;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#serieSynopsis .synopsis-text {
  display: block;
  overflow: hidden;
}
#espelharBtn {
  display: none !important;
}

.btn-success {
  background-color: #FFC107;
  color: #000000;
  font-size: 1rem;
  padding: 0.25rem 1rem;
  border-radius: 10px;
  font-weight: bold;
  margin-left: 0; /* 👈 remove o bug */
}

.btn-success:hover {
  background: #007BFF;
}

.active-episode {
  background: #ffc107 !important;
  color: #000 !important;
  font-weight: bold;
  border-radius: 8px;
  transition: 0.3s;
}

.modal-header {
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  border: none;
  position: absolute;
  width: 100%;
  z-index: 10;
}

#modalTitleText {
  font-size: clamp(10px, 2vw, 14px);
}
/* GRID de episódios */
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15px, 1fr));
  gap: 10px;
}

/* quadradinho */
.episode-box {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.episode-box:hover {
  transform: scale(1.05);
}

/* thumb */
.ep-thumb-grid {
  width: 100%;
  height: 60px;
  object-fit: cover;
}

/* número do episódio */
.ep-number {
  position: absolute;
  bottom: 5px;
  right: 8px;
  background: #ffc107;
  color: #000;
  font-size: 12px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 6px;
}
.episode-box.active-episode {
  outline: 2px solid #ffc107;
}
.episode-grid {
  display: flex;
  overflow-x: auto;
}
/* Informações do Modal sempre visível */
.modal-header {
  opacity: 1 !important;
  transition: none !important;
}
/* logotipo maior */
.logo-fixed {
  width: 40px;        /* tamanho padrão que você quer */
  height: 40px;       /* força proporção fixa */
  object-fit: contain; /* mantém a imagem inteira sem distorcer */
}
</style>

</head>
<body>
<button id="backButton" class="btn btn-primary btn-lg">Voltar</button>

<div id="centralSearch">
  <input type="search" id="seriesSearch" class="form-control" placeholder="Pesquisar...">
  <select id="categoryFilter" class="form-select">
    <option value="">Todas as Categorias</option>
  </select>
</div>

<ul class="nav nav-tabs d-flex flex-wrap gap-3 mb-3 border-0" id="seriesTabs"></ul>

<div id="serieInfo" class="card p-3">
  <div class="serie-details">
    <img id="seriePoster" src="" alt="Poster da Série">
    <div>
      <h4 id="serieTitle"></h4>
      <p id="serieSynopsis" class="mb-0"></p>
      <p><strong>Categoria:</strong> <span id="serieCategories"></span></p>
      <p><strong>Gênero:</strong> <span id="serieGênero"></span></p>
      <p><strong>Linguagem:</strong> <span id="serieLanguage"></span></p>
    </div>
  </div>
  <div id="seasonEpisodesContainer" class="mt-4"></div>
</div>

<!-- Rodapé institucional após os canais -->
<div class="col-12 mt-4">
   <div class="playerButtons" id="serverButtons"></div>
  <div style="margin-top: 40px; font-size: 0.85rem; color: #000; text-align: center; max-width: 800px; margin-left: auto; margin-right: auto;">
    <p><br></p>
    <p></p>
  </div>
</div>

<div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content text-white" style="background:transparent;">
      <div class="modal-header border-0 modal-header-transparent">
        <h5 id="modalTitle" class="modal-title d-flex align-items-center gap-2">
    <img id="modalLogo" src="" class="logo-fixed">
    <span id="modalTitleText"></span>
</h5>
        <div>
          <button id="prevEpisodeBtn" class="btn btn-sm me-2">⏮️ </button>
          <button id="nextEpisodeBtn" class="btn btn-sm me-2">⏭️ </button>
          <button id="castButton" class="btn btn-sm me-2">📺 </button>
          <button type="button" class="btn btn-sm btn-danger me-2" data-bs-dismiss="modal"> X </button>
        </div>
      </div>

      <div class="modal-body p-0">
  <iframe id="iframePlayer"
    width="100%"
    height="100%"
    style="border:none;"
    allow="autoplay; fullscreen">
  </iframe>
</div>
    </div>
  </div>
</div>

<footer class="footer">
  <img src="https://www.mediafire.com/convkey/7a81/hl79s61t5v9c0555g.jpg" alt="Logo" />
  <span>JC TV STREAMING © 2026</span>
</footer>

// ---------------- Elementos
const seriesTabs = document.getElementById("seriesTabs");
const serieInfo = document.getElementById("serieInfo");
const serieTitle = document.getElementById("serieTitle");
const serieSynopsis = document.getElementById("serieSynopsis");
const seriePoster = document.getElementById("seriePoster");
const serieCategories = document.getElementById("serieCategories");
const serieGênero = document.getElementById("serieGênero");
const serieLanguage = document.getElementById("serieLanguage");
const seasonEpisodesContainer = document.getElementById("seasonEpisodesContainer");
const seriesSearch = document.getElementById("seriesSearch");
const categoryFilter = document.getElementById("categoryFilter");
const backButton = document.getElementById('backButton');
const iframePlayer = document.getElementById("iframePlayer");
const modalTitle = document.getElementById("modalTitle");
const prevEpisodeBtn = document.getElementById("prevEpisodeBtn");
const nextEpisodeBtn = document.getElementById("nextEpisodeBtn");
const castButton = document.getElementById("castButton");
const modalLogo = document.getElementById("modalLogo");
const modalTitleText = document.getElementById("modalTitleText");

let currentSeries = null;
let episodeQueue = [];
let currentEpisodeIndex = 0;
let currentHls = null;

// ---------------- Categorias
function populateCategories(){
  const allCategories = new Set();
  Object.values(seriesData).forEach(s => s.categories.forEach(c => allCategories.add(c)));
  [...allCategories].sort().forEach(cat=>{
    const option = document.createElement("option");
    option.value = cat; option.textContent = cat;
    categoryFilter.appendChild(option);
  });
}

// ---------------- Monta abas (ordenando por date)
function buildTabs(filteredKeys = null) {
  seriesTabs.innerHTML = "";
  let keys = filteredKeys || Object.keys(seriesData);

  // Ordena por data (mais recente primeiro)
  keys.sort((a, b) => {
    const dateA = seriesData[a].date
      ? new Date(seriesData[a].date.split("/").reverse().join("-"))
      : new Date(0);
    const dateB = seriesData[b].date
      ? new Date(seriesData[b].date.split("/").reverse().join("-"))
      : new Date(0);
    return dateB - dateA;
  });

  keys.forEach(key => {
    const s = seriesData[key];
    const li = document.createElement("li");
    li.className = "nav-item";

    const btn = document.createElement("button");
    btn.className = "nav-link p-0 border-0 bg-transparent text-center series-tab";
    btn.dataset.target = key;

    // 🔴 TV AO VIVO
  if (s.categories && s.categories.some(c => c.toLowerCase() === "tv ao vivo")) {

    btn.innerHTML = `
      <div class="card border-0 text-center" style="width: 110px;">
        <img src="${s.poster}" 
          style="height:60px; object-fit:contain; background:#fff; padding:5px;" 
          class="rounded">

        <div class="card-body p-1">
          <p class="card-text small mb-0">${s.name}</p>
          <small style="font-size:10px; color:#6c757d;">
            <span style="color:#dc3545;">●</span> Ao Vivo
          </small>
        </div>
      </div>
    `;

  } else {

    btn.innerHTML = `
      <div class="card border-0" style="width: 80px;">
        <img src="${s.poster}" class="card-img-top rounded"
          style="height:120px;object-fit:cover;" alt="${s.name}">
        
        <div class="card-body p-1">
          <p class="card-text small text-truncate mb-0">${s.name}</p>
        </div>
      </div>
    `;
  }

  li.appendChild(btn);
  seriesTabs.appendChild(li);
});

// ✅ ESSA LINHA FALTAVA
}

// -------------------- Mostra detalhes da série --------------------
function showSeasons(key, tabBtn) {
  const s = seriesData[key];
  const isLive = s.categories.includes("TV ao vivo");
  const isMovie = s.categories.includes("Filmes");
  serieTitle.textContent = s.name;
  seriePoster.src = s.poster;
  serieCategories.textContent = s.categories.join(", ");
  serieGênero.textContent = s.genero.join(", ");
  serieLanguage.textContent = s.language.join(", ");
  serieInfo.style.display = "block";

  // Sinopse com "ler mais/ler menos"
  serieSynopsis.innerHTML = "";
  const synopsisText = document.createElement("span");
  synopsisText.className = "synopsis-text";
  synopsisText.style.whiteSpace = "pre-wrap";
  synopsisText.style.display = "inline";

  const fullText = s.synopsis.trim();
  const shortText = fullText.length > 100 ? fullText.slice(0, 100) + "..." : fullText;
  let expanded = false;

  synopsisText.textContent = shortText;
  serieSynopsis.appendChild(synopsisText);

  if (fullText.length > 50) {
    const lerMaisBtn = document.createElement("span");
    lerMaisBtn.textContent = " ler mais";
    lerMaisBtn.style.color = "#007bff";
    lerMaisBtn.style.cursor = "pointer";
    lerMaisBtn.style.textDecoration = "underline";
    lerMaisBtn.style.marginLeft = "5px";

    serieSynopsis.appendChild(lerMaisBtn);

    lerMaisBtn.addEventListener("click", () => {
      expanded = !expanded;
      if (expanded) { synopsisText.textContent = fullText; lerMaisBtn.textContent = " ler menos"; }
      else { synopsisText.textContent = shortText; lerMaisBtn.textContent = " ler mais"; }
    });
  }

  // Posiciona info logo abaixo da aba selecionada
  const li = tabBtn.closest("li");
  li.insertAdjacentElement("afterend", serieInfo);

  // ---------------- Episódios ----------------
  seasonEpisodesContainer.innerHTML = "";

// 🎬 FILME
// ---------------- Background (ANTES DE TUDO)
document.body.style.backgroundImage = `url('${s.background}')`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";
document.body.style.backgroundRepeat = "no-repeat";
document.body.style.backgroundAttachment = "fixed";

// 🎬 FILME
if (isMovie) {
  const movie = s.seasons[1][0];

  const btn = document.createElement("div");
  btn.innerHTML = `
    <div style="display:flex; justify-content:center; align-items:center; min-height:100px;">
      <button class="btn btn-success btn-lg play-movie"
        data-vid="${movie.url}"
        data-title="${s.name}">
        ▶ Assistir
      </button>
    </div>
  `;

  seasonEpisodesContainer.appendChild(btn);
  return;
}

</div>

// ---------------- Filtros de busca + categoria
function applyFilters() {
  const q = (seriesSearch.value || "").toLowerCase().trim();
  const cat = categoryFilter.value;

  const keys = Object.keys(seriesData).filter(key => {
    const s = seriesData[key];

    // 🔍 busca em nome
    const matchName = s.name.toLowerCase().includes(q);

    // 🔍 busca em categorias
    const matchCategory = (s.categories || [])
      .some(c => c.toLowerCase().includes(q));

    // 🔍 busca em gênero
    const matchGenero = (s.genero || [])
      .some(g => g.toLowerCase().includes(q));

    // 🔍 busca em linguagem
    const matchLanguage = (s.language || [])
      .some(l => l.toLowerCase().includes(q));

    // 🔍 busca em episódios (SUBCATEGORIA 🔥)
    const matchEpisodes = Object.values(s.seasons || {})
      .flat()
      .some(ep => ep.title && ep.title.toLowerCase().includes(q));

    // 🔍 resultado final
    const matchSearch = !q || (
      matchName ||
      matchCategory ||
      matchGenero ||
      matchLanguage ||
      matchEpisodes
    );

    // 🎯 filtro de categoria selecionada
    const matchCatFilter = !cat || (s.categories || [])
      .some(c => c.toLowerCase() === cat.toLowerCase());

    return matchSearch && matchCatFilter;
  });

  buildTabs(keys);
}

function playEpisode(index){
  if(index < 0 || index >= episodeQueue.length) return;

  currentEpisodeIndex = index;
  const videoData = episodeQueue[currentEpisodeIndex];

  // ---------------- TÍTULO DO MODAL ----------------
  document.getElementById("modalTitleText").textContent = videoData.title;

  // ---------------- LOGOTIPO NO MODAL ----------------
  const modalLogo = document.getElementById("modalLogo");

  if (videoData.logo) {
    modalLogo.src = videoData.logo;
    modalLogo.style.display = "block";
  } else {
    modalLogo.style.display = "none";
  }

  // ---------------- PLAYER ----------------
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }

  new bootstrap.Modal(document.getElementById("playerModal")).show();
}
